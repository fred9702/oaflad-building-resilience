      - generic [ref=e34]:
        - img [ref=e35]
        - blockquote [ref=e37]: Bâtir l'édifice nouveau, c'est faire le choix d'une société plus juste, plus équilibrée et résolument tournée vers l'humain. Dans cette ambition, la valorisation du capital humain est essentielle. Elle implique un engagement clair en faveur de l'éducation, de la protection sociale et de l'inclusion, notamment des femmes et des jeunes. Car il ne peut y avoir de développement durable sans équité. Il ne peut y avoir de Nation forte sans la pleine participation des femmes. Les femmes gabonaises sont au cœur de cette dynamique. Elles portent, chaque jour, une part essentielle de l'équilibre social, de la transmission des valeurs et du progrès collectif. Le Gabon que nous bâtissons est un Gabon où chacune trouve sa place, où chacune avance avec dignité, et où personne n'est laissé de côté.
